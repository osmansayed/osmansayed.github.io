<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maven Market | سيد عثمان - محلل بيانات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 50%, #f5f3ff 100%);
            min-height: 100vh;
        }
        @keyframes cardFadeUp {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes floatSmooth { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes slideInLeft { 0% { opacity: 0; transform: translateX(-30px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(30px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); } 50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.6); } }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 120px 20px 60px;
        }

        h1 {
            text-align: center;
            color: #6366f1;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .project-info {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
        }

        .report-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.12);
            background: white;
            opacity: 0;
            animation: cardFadeUp 0.8s ease forwards;
        }

        .report-container iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border: none;
        }

        .back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: 700;
            color: #6366f1;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
            transition: 0.3s;
        }

        .back:hover {
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
        }

        .nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>لوحة Maven Market</h1>
        <p class="project-info">تحليل أداء المبيعات والأرباح ومعدلات المرتجعات</p>

        <div class="report-container">
            <iframe 
                src="https://app.powerbi.com/view?r=eyJrIjoiNjRjMDcxNTQtYjNlNS00ZDcxLWE4MjYtNmIwMTdlZjdkZTliIiwidCI6Ijc1OGU5OTgzLTM2ZjYtNGVjZS1iYWIzLWJmZGQ2NDRlMzM4NyIsImMiOjl9"
                frameborder="0"
                allowFullScreen="true">
            </iframe>
        </div>

        <a href="projects.html" class="back">⬅ العودة للمشاريع</a>
    </div>

</body>
</html>
