        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
        function toggleMobileMenu() {
            const mobileMenu = document.querySelector('.mobile-menu');
            mobileMenu.classList.toggle('active');
        }
        document.querySelectorAll('.mobile-menu a').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelector('.mobile-menu').classList.remove('active');
            });
        });
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            if (body.classList.contains('dark-mode')) { body.classList.remove('dark-mode'); themeIcon.className = 'ph-bold ph-moon'; localStorage.setItem('theme', 'light'); }
            else { body.classList.add('dark-mode'); themeIcon.className = 'ph-bold ph-sun'; localStorage.setItem('theme', 'dark'); }
        }
        if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('themeIcon').className = 'ph-bold ph-sun'; }
        
        let currentLang = 'ar';
        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.querySelectorAll('[data-ar][data-en]').forEach(el => { el.textContent = el.getAttribute('data-' + currentLang); });
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelector('.lang-btn').textContent = currentLang === 'ar' ? 'ع' : 'En';
            localStorage.setItem('language', currentLang);
        }
        if (localStorage.getItem('language')) {
            currentLang = localStorage.getItem('language');
            document.querySelectorAll('[data-ar][data-en]').forEach(el => { el.textContent = el.getAttribute('data-' + currentLang); });
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelector('.lang-btn').textContent = currentLang === 'ar' ? 'ع' : 'En';
        }
    </script>
</body>
</html>
